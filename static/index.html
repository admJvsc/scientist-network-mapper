<!DOCTYPE html>
<html>
<head>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>#mynetwork { width: 600px; height: 400px; border: 1px solid lightgray; }</style>
</head>
<body>
    <input type="text" id="nazwisko" placeholder="Wpisz imie i nazwisko...">
    <button onclick="pobierzDane()">Szukaj</button>
    <div id="mynetwork"></div>

    <script>
        async function pobierzDane() {
            const input = document.getElementById('nazwisko').value;
            const res = await fetch(`/api/naukowiec/${encodeURIComponent(input)}`);
            const data = await res.json();
            const nodes = new vis.DataSet([{ id: 1, label: data.name }]);
            const edges = new vis.DataSet([]);

            data.top_coauthors.forEach((ca, index) => {
                let nodeId = 100 + index
                nodes.add({ id: nodeId, label: ca.name, color: '#97C2FC' });
                edges.add({ from: 1, to: nodeId, label: "współpraca" });
            });

            nodes.add({ id: 999, label: "Cytowania: " + data.total_citations, color: '#FFD700', shape: 'box' });
            edges.add({ from: 1, to: 999 });

            const container = document.getElementById('mynetwork');
            new vis.Network(container, { nodes, edges }, {});
        }
    </script>
</body>
</html>
